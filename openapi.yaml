openapi: 3.0.3
info:
  title: Ordryn / GoTodo API
  description: |
    JSON API for Ordryn (GoTodo). Self-host with `GOTODO_MODE=full` (UI + API) or
    `GOTODO_MODE=api` (API only). Redis is required for `/api/v1` authentication and rate limiting.

    Auth: session cookie (SPA login/register) or `Authorization: Bearer <api_key>`.
  version: 1.0.0
  license:
    name: See LICENSE in repository

servers:
  - url: /
    description: Same-origin (BASE_PATH may prefix these paths)

tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: API Keys
  - name: Tasks
  - name: Projects
  - name: Tags
  - name: Saved Views
  - name: Device Auth

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Public health probe
      security: []
      responses:
        "200":
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/v1/site:
    get:
      tags: [Health]
      summary: Public site metadata for the SPA shell
      security: []
      responses:
        "200":
          description: Site metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteInfo"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register and start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created; Set-Cookie session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/APIError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; Set-Cookie session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Clear session cookie
      security: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OK"

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, confirm_email]
              properties:
                email:
                  type: string
                  format: email
                confirm_email:
                  type: string
                  format: email
      responses:
        "200":
          description: Request accepted (always returns ok when valid)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/reset-password:
    get:
      tags: [Auth]
      summary: Validate a password reset token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  email:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags: [Auth]
      summary: Set a new password using a reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, token, new_password, confirm_password]
              properties:
                id:
                  type: string
                token:
                  type: string
                new_password:
                  type: string
                  format: password
                confirm_password:
                  type: string
                  format: password
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OK"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/device/code:
    post:
      tags: [Device Auth]
      summary: Start device authorization (Android SSO)
      description: |
        Optional `redirect_uri` binds a native deep link (allowlisted `ordryn://auth-complete`)
        to this authorization. After the user approves or denies in the browser, the SPA
        navigates to that URI so the Android app can resume.
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                client_name:
                  type: string
                redirect_uri:
                  type: string
                  description: Optional native deep link; must be ordryn://auth-complete
                  example: ordryn://auth-complete
      responses:
        "200":
          description: Device codes issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCodeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/device/token:
    post:
      tags: [Device Auth]
      summary: Poll device authorization for API key
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_code, grant_type]
              properties:
                device_code:
                  type: string
                grant_type:
                  type: string
                  description: Must be urn:ietf:params:oauth:grant-type:device_code
      responses:
        "200":
          description: Approved; returns api_key once
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    type: string
                  key_prefix:
                    type: string
                  key_name:
                    type: string
        "400":
          description: Pending, denied, expired, or invalid (OAuth-style error body)

  /api/v1/auth/device/status:
    get:
      tags: [Device Auth]
      summary: Look up a pending device authorization by user_code
      security: []
      parameters:
        - name: user_code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceStatus"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/device/approve:
    post:
      tags: [Device Auth]
      summary: Approve a pending device authorization
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code:
                  type: string
      responses:
        "200":
          description: Approved; includes redirect_uri when the device requested one
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceDecisionResponse"

  /api/v1/auth/device/deny:
    post:
      tags: [Device Auth]
      summary: Deny a pending device authorization
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code:
                  type: string
      responses:
        "200":
          description: Denied; includes redirect_uri when the device requested one
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceDecisionResponse"

  /api/v1/me:
    get:
      tags: [Profile]
      summary: Current user profile
      description: |
        Unauthenticated session probes return HTTP 200 with a JSON `null` body
        (not 401), so SPA bootstrap works behind proxies that rewrite 401 to HTML.
        Invalid Bearer tokens still return 401.
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Profile, or null when no session
          content:
            application/json:
              schema:
                nullable: true
                allOf:
                  - $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Profile]
      summary: Update profile fields
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPatch"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/password:
    post:
      tags: [Profile]
      summary: Change password
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List active API keys (no plaintext)
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Key metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"
    post:
      tags: [API Keys]
      summary: Create or rotate a named API key
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 80
      responses:
        "201":
          description: Key created; plaintext shown once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          $ref: "#/components/responses/APIError"

  /api/v1/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "204":
          description: Revoked
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
          description: Project id, or none/0 for no project
        - name: tag
          in: query
          schema:
            type: string
        - name: due
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: completed
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
    post:
      tags: [Tasks]
      summary: Create a task
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/tasks/reorder:
    post:
      tags: [Tasks]
      summary: Reorder tasks within a favorite group
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskReorder"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OK"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/tasks/bulk:
    post:
      tags: [Tasks]
      summary: Apply a bulk action to tasks
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskBulk"
      responses:
        "200":
          description: Action applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/tasks/undo:
    post:
      tags: [Tasks]
      summary: Restore deleted tasks via undo_token (or session undo buffer)
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                undo_token:
                  type: string
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  restored:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Tasks]
      summary: Get one task
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Tasks]
      summary: Update a task
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskPatch"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tasks]
      summary: Delete a task (returns undo_token)
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Deleted with undo token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tasks/{id}/events:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Tasks]
      summary: Task activity timeline
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Events newest-first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskEvent"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List projects
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [Projects]
      summary: Create a project
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Projects]
      summary: Get a project (owned or shared)
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: Rename a project (owner only)
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NameBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Projects]
      summary: Delete a project (owner only)
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{id}/members:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Projects]
      summary: List project members
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{id}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: userId
        in: path
        required: true
        schema:
          type: integer
    patch:
      tags: [Projects]
      summary: Update member role (owner only)
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleBody"
      responses:
        "204":
          description: Updated
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Projects]
      summary: Remove member or leave project
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "204":
          description: Removed
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{id}/invites:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Projects]
      summary: List pending project invites (owner only)
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectInvite"
    post:
      tags: [Projects]
      summary: Invite a user by email (owner only)
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInviteCreate"
      responses:
        "200":
          description: Privacy-preserving acknowledgment (does not reveal whether the email exists or an invite was created)
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/projects/{id}/invites/{inviteId}:
    parameters:
      - $ref: "#/components/parameters/ID"
      - name: inviteId
        in: path
        required: true
        schema:
          type: integer
    delete:
      tags: [Projects]
      summary: Revoke a pending invite (owner only)
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "204":
          description: Revoked
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{id}/events:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Projects]
      summary: Project activity feed
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 200
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectEvent"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/project-invites:
    get:
      tags: [Projects]
      summary: List pending invites for the current user
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "200":
          description: Pending invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectInvite"

  /api/v1/project-invites/{id}/accept:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Projects]
      summary: Accept a project invite
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "204":
          description: Accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/project-invites/{id}/decline:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Projects]
      summary: Decline a project invite
      security:
        - SessionCookie: []
        - BearerAuth: []
      responses:
        "204":
          description: Declined
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/share-links:
    get:
      tags: [Projects]
      summary: List share links for a scope
      security:
        - SessionCookie: []
        - BearerAuth: []
      parameters:
        - name: scope_type
          in: query
          required: true
          schema:
            type: string
            enum: [project, tag]
        - name: scope_id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShareLink"
    post:
      tags: [Projects]
      summary: Create a read-only share link
      security:
        - SessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareLinkCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/share-links/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
