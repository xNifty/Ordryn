components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: API key from profile, bootstrap, or device auth
    SessionCookie:
      type: apiKey
      in: cookie
      name: session
      description: httpOnly session cookie from /api/v1/auth/login or register

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    APIError:
      description: API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable code (e.g. invalid_request)
        message:
          type: string

    OK:
      type: object
      properties:
        ok:
          type: boolean

    Health:
      type: object
      properties:
        version:
          type: string
        api_enabled:
          type: boolean
        redis_ok:
          type: boolean
        mode:
          type: string
          enum: [full, api]

    SiteInfo:
      type: object
      properties:
        site_name:
          type: string
        show_changelog:
          type: boolean
        enable_global_announcement:
          type: boolean
        global_announcement_text:
          type: string
        announcement_dismissed:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        user_name:
          type: string
        timezone:
          type: string
        items_per_page:
          type: integer
        permissions:
          type: array
          items:
            type: string
        digest_enabled:
          type: boolean
        digest_hour:
          type: integer
          minimum: 0
          maximum: 23
        allow_project_invites:
          type: boolean
          description: When false, the user cannot be invited to shared projects

    UserPatch:
      type: object
      properties:
        user_name:
          type: string
        timezone:
          type: string
        items_per_page:
          type: integer
          enum: [10, 15, 25, 50]
        digest_enabled:
          type: boolean
        digest_hour:
          type: integer
          minimum: 0
          maximum: 23
        allow_project_invites:
          type: boolean

    RegisterRequest:
      type: object
      required: [email, password, confirm_password]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
        confirm_password:
          type: string
        timezone:
          type: string
        invite_token:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password, confirm_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
        confirm_password:
          type: string

    APIKey:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key_prefix:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true

    APIKeyCreated:
      allOf:
        - $ref: "#/components/schemas/APIKey"
        - type: object
          required: [key]
          properties:
            key:
              type: string
              description: Plaintext key; shown only once

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        owner_email:
          type: string
        owner_user_id:
          type: integer

    ProjectMember:
      type: object
      properties:
        user_id:
          type: integer
        email:
          type: string
        user_name:
          type: string
        role:
          type: string
          enum: [owner, editor, viewer]
        created_at:
          type: string
          format: date-time

    ProjectInvite:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [editor, viewer]
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        project_name:
          type: string
        inviter_email:
          type: string

    ProjectInviteCreate:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [editor, viewer]

    RoleBody:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [editor, viewer]

    ProjectEvent:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        actor_user_id:
          type: integer
        actor_email:
          type: string
        event_type:
          type: string
        source:
          type: string
          enum: [project, task]
        task_id:
          type: integer
        label:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ShareLink:
      type: object
      properties:
        id:
          type: integer
        token:
          type: string
        url:
          type: string
        scope_type:
          type: string
          enum: [project, tag]
        scope_id:
          type: integer
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ShareLinkCreate:
      type: object
      required: [scope_type, scope_id]
      properties:
        scope_type:
          type: string
          enum: [project, tag]
        scope_id:
          type: integer
        expires_at:
          type: string
          format: date-time

    ShareLinkView:
      type: object
      properties:
        scope_type:
          type: string
        scope_id:
          type: integer
        tasks:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              completed:
                type: boolean
              due_date:
                type: string
              priority:
                type: integer
              project:
                type: string
              tags:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

    NameBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 50

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        due_date:
          type: string
        project_id:
          type: integer
          nullable: true
        project:
          type: string
        priority:
          type: integer
          minimum: 0
          maximum: 3
        favorite:
          type: boolean
        position:
          type: integer
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        created_at:
          type: string
        modified_at:
          type: string

    TaskList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        total_pages:
          type: integer
        completed_count:
          type: integer
        incomplete_count:
          type: integer

    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        due_date:
          type: string
        project_id:
          type: integer
          nullable: true
        priority:
          type: integer
        completed:
          type: boolean
        favorite:
          type: boolean
        tag_ids:
          type: array
          items:
            type: integer

    TaskPatch:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        due_date:
          type: string
        clear_due_date:
          type: boolean
        project_id:
          type: integer
          nullable: true
        priority:
          type: integer
        completed:
          type: boolean
        favorite:
          type: boolean
        tag_ids:
          type: array
          items:
            type: integer

    TaskReorder:
      type: object
      required: [task_ids, favorite]
      properties:
        task_ids:
          type: array
          items:
            type: integer
        favorite:
          type: boolean
        page:
          type: integer
        per_page:
          type: integer
        project:
          type: string

    TaskBulk:
      type: object
      required: [action, task_ids]
      properties:
        action:
          type: string
          enum:
            - complete
            - incomplete
            - delete
            - move_project
            - add_tag
            - remove_tag
            - set_priority
            - set_due_date
        task_ids:
          type: array
          items:
            type: integer
          maxItems: 100
        project_id:
          type: integer
          nullable: true
        tag_id:
          type: integer
        priority:
          type: integer
          minimum: 0
          maximum: 3
        due_date:
          type: string
          description: YYYY-MM-DD; empty string clears

    BulkResult:
      type: object
      properties:
        ok:
          type: boolean
        affected:
          type: integer
        action:
          type: string
        undo_token:
          type: string
        expires_in:
          type: integer

    ImportPreview:
      type: object
      properties:
        preview:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              project:
                type: string
              due_date:
                type: string
              tags:
                type: string
        would_import:
          type: integer
        would_skip:
          type: integer
        total_rows:
          type: integer

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer

    DeleteResult:
      type: object
      properties:
        ok:
          type: boolean
        undo_token:
          type: string
        expires_in:
          type: integer

    TaskEvent:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        event_type:
          type: string
        label:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    SavedViewFilter:
      type: object
      properties:
        project:
          type: string
        status:
          type: string
        due:
          type: string
        completed:
          type: string
        priority:
          type: string
        tag:
          type: string
        sort:
          type: string
        search:
          type: string

    SavedView:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        filter:
          $ref: "#/components/schemas/SavedViewFilter"
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SavedViewCreate:
