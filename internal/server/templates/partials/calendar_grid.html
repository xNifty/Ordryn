<div id="calendar-grid" class="calendar-grid-wrap" data-month="{{.Calendar.YearMonth}}">
    <div class="calendar-weekdays" aria-hidden="true">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div class="calendar-grid" role="grid" aria-label="Task calendar for {{.Calendar.MonthLabel}}">
        {{range .Calendar.Weeks}}
        <div class="calendar-week" role="row">
            {{range .}}
            <div class="calendar-cell{{if not .InMonth}} calendar-cell--muted{{end}}{{if .IsToday}} calendar-cell--today{{end}}"
                role="gridcell"
                data-date="{{.Date}}"
                aria-label="{{.Date}}">
                <div class="calendar-cell-header">
                    <span class="calendar-day-num">{{.Day}}</span>
                    {{if .InMonth}}
                    <button type="button"
                        class="btn btn-link btn-sm calendar-add-btn p-0"
                        data-due-date="{{.Date}}"
                        title="Add task on {{.Date}}"
                        aria-label="Add task on {{.Date}}">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                    {{end}}
                </div>
                {{if .Tasks}}
                <ul class="calendar-task-list">
                    {{range .Tasks}}
                    <li class="calendar-task-item {{dueDateClass .Due false $.Timezone}}{{if eq .Priority 3}} calendar-task--high{{else if eq .Priority 2}} calendar-task--med{{end}}">
                        <button type="button"
                            class="calendar-task-complete"
                            hx-get="{{basePath}}/api/update-status?id={{.ID}}&page=1{{calendarFromQuery $.Calendar.YearMonth}}"
                            hx-swap="none"
                            title="Mark complete"
                            aria-label="Mark {{.Title}} complete">
                            <i class="bi bi-check2"></i>
                        </button>
                        <button type="button"
                            class="calendar-task-title"
                            hx-get="{{basePath}}/api/edit?id={{.ID}}&page=1{{calendarFromQuery $.Calendar.YearMonth}}"
                            hx-target="#sidebar .sidebar-body"
                            hx-swap="innerHTML"
                            title="{{.Title}}">
                            {{if eq (dueDateClass .Due false $.Timezone) "due-overdue"}}<i class="bi bi-exclamation-circle" aria-hidden="true"></i> {{end}}{{.Title}}
                        </button>
                        {{if .ProjectName}}
                        <span class="calendar-task-project">{{.ProjectName}}</span>
                        {{end}}
                    </li>
                    {{end}}
                </ul>
                {{end}}
            </div>
            {{end}}
        </div>
        {{end}}
    </div>
</div>
