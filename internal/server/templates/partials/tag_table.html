<table class="table table-striped tags-table">
    <thead>
        <tr>
            <th>Tag</th>
            <th style="width:120px">Actions</th>
        </tr>
    </thead>
    <tbody>
        {{range .Tags}}
        <tr>
            <td data-label="Tag">
                <span class="tag-name-display"><span class="tag-chip" style="background-color: {{.Color}};">{{.Name}}</span></span>
                <form class="tag-rename-form d-none d-inline-flex align-items-center gap-1" method="post" action="{{basePath}}/api/tags/update" hx-post="{{basePath}}/api/tags/update" hx-target="#tags-list" hx-swap="innerHTML">
                    <input type="hidden" name="id" value="{{.ID}}" />
                    <input class="form-control form-control-sm" name="name" value="{{.Name}}" maxlength="50" required />
                    <button class="btn btn-sm btn-primary" type="submit" aria-label="Save tag name"><i class="bi bi-check"></i></button>
                    <button class="btn btn-sm btn-secondary cancel-tag-rename-btn" type="button" aria-label="Cancel rename"><i class="bi bi-x"></i></button>
                </form>
                <button class="btn btn-sm btn-link edit-tag-btn p-0 ms-1" type="button" aria-label="Rename tag"><i class="bi bi-pencil"></i></button>
            </td>
            <td data-label="Actions">
                <form method="post" action="{{basePath}}/api/tags/delete" hx-post="{{basePath}}/api/tags/delete" hx-target="#tags-list" hx-swap="innerHTML" hx-confirm="Delete this tag? It will be removed from all tasks." style="display:inline;">
                    <input type="hidden" name="id" value="{{.ID}}" />
                    <button class="btn btn-sm btn-danger" type="submit" aria-label="Delete tag {{.Name}}"><i class="bi bi-trash"></i></button>
                </form>
            </td>
        </tr>
        {{else}}
        <tr><td colspan="2" class="text-muted">No tags yet. Tags are created when you add them to tasks.</td></tr>
        {{end}}
    </tbody>
</table>
<div id="tag-name-error" class="invalid-feedback d-block"></div>
