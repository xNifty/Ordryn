<form
    hx-post="{{if .FormAction}}{{.FormAction}}{{else}}{{basePath}}/api/add-task{{end}}"
    hx-include="#newTaskForm"
    method="post"
    id="newTaskForm"
    hx-target="#task-container"
    hx-swap="innerHTML"
    >
    <div class="form-group">
        <label for="title">Title:</label>
        <input
            type="text"
            id="title"
            name="title"
            class="form-control"
            required
            value="{{.FormTitle}}"
            placeholder="Your Task Title"
        />
    </div>
    <div class="form-group">
        {{if .Completed}}
        <div class="alert alert-success py-2 mb-2"><i class="bi bi-check-circle"></i> This task is completed</div>
        {{end}}
        <label for="description">Description:</label>
        <textarea
            id="description"
            name="description"
            class="form-control"
            maxlength="1000"
            hx-get="{{basePath}}/api/validate-description"
            hx-trigger="keyup changed delay:300ms"
            hx-target="#description-error"
            hx-swap="innerHTML"
        >{{.Description}}</textarea>
        <div class="d-flex justify-content-between align-items-center mt-1">
            <small class="form-hint">Max 1000 Characters</small>
            <small class="text-muted"><span id="char-count">{{if .Description}}{{len .Description}}{{else}}0{{end}}</span>/1000</small>
        </div>
        {{if .Error}}
        <div id="description-error" class="invalid-feedback d-block">{{.Error}}</div>
        {{else}}
        <div id="description-error" class="invalid-feedback d-block"></div>
        {{end}}
    </div>
    <div class="form-group mt-2">
        <label for="project_id">Project (optional):</label>
        <select id="project_id" name="project_id" class="form-select">
            <option value="">No project</option>
            {{range .Projects}}
            <option value="{{.ID}}" {{if .Selected}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
    </div>
    <div class="form-group mt-2">
        <label for="priority">Priority:</label>
        <select id="priority" name="priority_level" class="form-select">
            <option value="0" {{if or (not .Priority) (eq .Priority 0)}}selected{{end}}>None</option>
            <option value="1" {{if eq .Priority 1}}selected{{end}}>Low</option>
            <option value="2" {{if eq .Priority 2}}selected{{end}}>Medium</option>
            <option value="3" {{if eq .Priority 3}}selected{{end}}>High</option>
        </select>
    </div>
    <div class="form-group mt-2">
        <label for="due_date">Due Date (optional):</label>
        <input
            type="date"
            id="due_date"
            name="due_date"
            class="form-control"
            value="{{.DueDate}}"
        />
    </div>
    {{if .Tags}}
    <div class="form-group mt-2">
        <label>Tags (max 5)</label>
        {{range .Tags}}
        <div class="form-check">
            <input type="checkbox" class="form-check-input" name="tag_ids" value="{{.ID}}" id="tag-{{.ID}}" {{if .Selected}}checked{{end}}>
            <label class="form-check-label" for="tag-{{.ID}}">
                <span class="tag-chip" style="background-color: {{.Color}};">{{.Name}}</span>
            </label>
        </div>
        {{end}}
    </div>
    {{end}}
    <div class="form-group mt-2">
        <label for="new_tags">Add tags (comma-separated)</label>
        <input type="text" id="new_tags" name="new_tags" class="form-control" placeholder="e.g. work, urgent" maxlength="200" />
        <small class="form-hint">New tag names are created on save (max 5 tags per task).</small>
    </div>
    {{if .ID}}
    <input type="hidden" name="id" value="{{.ID}}" />
    {{end}}
    <input type="hidden" name="currentPage" value="{{.CurrentPage}}" />
    <input type="hidden" name="project" value="{{.ProjectFilter}}" />
    <input type="hidden" name="status" value="{{.StatusFilter}}" />
    <input type="hidden" name="due" value="{{.DueFilter}}" />
    <input type="hidden" name="sort" value="{{.SortFilter}}" />
    <input type="hidden" name="priority" value="{{.PriorityFilter}}" />
    <input type="hidden" name="tag" value="{{.TagFilter}}" />
    <button type="submit" class="btn btn-primary w-100 mt-3">
        {{if .SubmitText}}{{.SubmitText}}{{else}}Add Task{{end}}
    </button>
</form>
