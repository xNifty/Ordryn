<table class="table table-striped table-sm mb-0">
    <thead>
        <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {{range .Users}}
        <tr>
            <td>{{.Email}}</td>
            <td>{{if .UserName}}{{.UserName}}{{else}}<span class="text-muted">—</span>{{end}}</td>
            <td>
                {{if .IsBanned}}
                <span class="badge bg-danger">Banned</span>
                {{else}}
                <span class="badge bg-success">Active</span>
                {{end}}
            </td>
            <td>
                {{if .IsBanned}}
                <button type="button" class="btn btn-sm btn-success"
                    hx-post="{{basePath}}/api/unban-user?email={{.Email}}&source=admin"
                    hx-target="#users-table-body" hx-swap="innerHTML"
                    title="Unban user" aria-label="Unban {{.Email}}">
                    <i class="bi bi-person-check"></i> Unban
                </button>
                {{else}}
                <button type="button" class="btn btn-sm btn-danger"
                    hx-post="{{basePath}}/api/ban-user?email={{.Email}}&source=admin"
                    hx-target="#users-table-body" hx-swap="innerHTML"
                    title="Ban user" aria-label="Ban {{.Email}}">
                    <i class="bi bi-slash-circle"></i> Ban
                </button>
                {{end}}
            </td>
        </tr>
        {{else}}
        <tr><td colspan="4" class="text-muted">No registered users.</td></tr>
        {{end}}
    </tbody>
</table>
